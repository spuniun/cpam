    sonarr:                          # Can be individually specified per library as well
      url: http://172.20.20.250:8989
      token: c24bdd992ad84d63907909cd128f034c
      add_missing: false
      add_existing: false
      root_folder_path: /tv
      monitor: none
      quality_profile: 1080p
      language_profile: English
      series_type: standard
      season_folder: false
