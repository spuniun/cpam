        rating1_image: rt_tomato
        horizontal_position: right
        vertical_position: bottom
    - file: config/premovies.yml
    - pmm: commonsense
      template_variables:
        horizontal_offset: 15
        vertical_offset: 15
        horizontal_align: left
        vertical_align: bottom
    operations:
      mass_audience_rating_update: mdb_tomatoesaudience
      # see the wiki for how to use local files, folders, URLs, or files from git
    radarr:                          # Can be individually specified per library as well
      url: http://172.20.20.250:7879
      token: b19ad0a142c6406391c1ba3382fae8c6
      add_missing: false
      add_existing: false
      root_folder_path: /movies
      monitor: none
      availability: announced
      quality_profile: Any
      tag: pmm
      search: false
      radarr_path:
      plex_path: /home/plex/sorted/Pre
      upgrade_existing: false
      ignore_cache: false
  3D Movies:
    collection_files:
    - pmm: basic               # This is a file within PMM's defaults folder
    - pmm: imdb                # This is a file within PMM's defaults folder
      # see the wiki for how to use local files, folders, URLs, or files from git
    overlay_files:
    - remove_overlays: false     # Set this to true to remove all overlays
    - pmm: resolution
    - pmm: ratings
      template_variables:
        rating1: audience
        rating1_image: rt_tomato
        horizontal_position: right
        vertical_position: bottom
    - pmm: commonsense
      template_variables:
        horizontal_offset: 15
        vertical_offset: 15
        horizontal_align: left
        vertical_align: bottom
    - file: config/3dmovies.yml
    operations:
      mass_audience_rating_update: mdb_tomatoesaudience
      # see the wiki for how to use local files, folders, URLs, or files from git
  Music:
    collection_files:
    - file: config/Music.yml   # This is a local file THAT YOU MIGHT CREATE
