name: cpam-infra

services:

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /opt/sabnzbd:/config
      - /home/plex/scratch:/downloads
    ports:
      - 8080:8080
    restart: unless-stopped

  tautulli:
    image: ghcr.io/tautulli/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /opt/Tautulli:/config
    ports:
      - 8181:8181
    restart: unless-stopped

  wizarr:
    image: ghcr.io/wizarrrr/wizarr:latest
    container_name: wizarr
    environment:
      - TZ=${TZ:-America/New_York}
      - APP_URL=https://invite.cpam.tv
      - DISABLE_BUILTIN_AUTH=false
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /var/lib/plexmediaserver/.config/Wizarr:/data/database
    ports:
      - 127.0.0.1:5690:5690
    networks:
      - default
      - cpam-shared
    restart: unless-stopped

  kometa:
    image: kometateam/kometa:latest
    container_name: kometa
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/lib/plexmediaserver/.config/plex-meta-manager/config:/config
    restart: "no"

  seerr:
    image: seerr/seerr:latest
    container_name: seerr
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - /opt/overseerr:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped

  audiobot:
    build: ./audiobot
    container_name: audiobot
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=INFO
      - DISCORD_TOKEN=${AUDIOBOT_DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${CPAM_GUILD_ID}
      - DISCORD_CHANNEL_ID=${AUDIOBOT_CHANNEL_ID}
      - WIZARR_URL=http://wizarr:5690
      - WIZARR_API_KEY=${WIZARR_API_KEY}
      - WIZARR_PUBLIC_URL=https://invite.cpam.tv
      - WIZARR_SERVER_IDS=2
      - EXPIRES_IN_DAYS=1
      - STATE_FILE=/data/invites.json
    volumes:
      - /var/lib/plexmediaserver/.config/audiobot:/data
    networks:
      - default
      - cpam-shared
    depends_on:
      - wizarr
    restart: unless-stopped

  doplarr:
    image: ghcr.io/activexray/doplarr_rs:latest
    container_name: doplarr
    environment:
      - TZ=${TZ:-America/New_York}
      # Referenced from config.toml via ${VAR} substitution
      - DOPLARR_DISCORD_TOKEN=${DOPLARR_DISCORD_TOKEN}
      - SEERR_API_KEY=${SEERR_API_KEY}
    volumes:
      - ./doplarr/config.toml:/config.toml:ro
    depends_on:
      - seerr
    restart: unless-stopped

  wrapperr:
    image: ghcr.io/aunefyren/wrapperr:latest
    container_name: wrapperr
    volumes:
      - /opt/wrapperr:/app/config
    ports:
      - 8282:8282
    restart: unless-stopped

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ:-America/New_York}
      - WATCHTOWER_SCHEDULE=0 0 4 * * *   # 4am daily
      - WATCHTOWER_CLEANUP=true           # remove old images after update
      - WATCHTOWER_INCLUDE_STOPPED=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

networks:
  cpam-shared:
    external: true
