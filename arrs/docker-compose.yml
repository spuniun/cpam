name: cpam-arrs

services:

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/lib/sonarr:/config
      - /home/plex/sorted/TV:/tv
      - /home/plex/scratch/nzbdrone:/downloads
      - /mnt/sftp/unitmonkey/torrents/rtorrent:/rtorrent
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/lib/plexmediaserver/.config/Radarr:/config
      - /home/plex/sorted/Movies:/movies
      - /home/plex/scratch/complete/movies:/downloads
      - /mnt/sftp/unitmonkey/torrents/rtorrent:/rtorrent
    ports:
      - 7878:7878
    restart: unless-stopped

  preradarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: preradarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/lib/plexmediaserver/.config/Pre:/config
      - /home/plex/sorted/Pre:/movies
      - /home/plex/scratch/complete/pre:/downloads
      - /mnt/sftp/unitmonkey/torrents/rtorrent:/rtorrent
    ports:
      - 7879:7879
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/lib/plexmediaserver/.config/Lidarr:/config
      - /home/plex/sorted/Music:/music
      - /home/plex/scratch/complete/music:/downloads
      - /mnt/sftp/unitmonkey/torrents/rtorrent:/rtorrent
    ports:
      - 8686:8686
    restart: unless-stopped

  listenarr:
    image: ghcr.io/listenarrs/listenarr:canary
    container_name: listenarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ:-America/New_York}
      - UMASK=022
      - LISTENARR_PUBLIC_URL=https://audio.cpam.tv
    volumes:
      - /var/lib/plexmediaserver/.config/Listenarr:/app/config
      - /home/plex/sorted/Audiobooks:/audiobooks
      - /mnt/sftp/unitmonkey/Downloads/audiobooks:/downloads
    ports:
      - 4545:4545
    restart: unless-stopped

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - AUDIOBOOKSHELF_UID=${PUID}
      - AUDIOBOOKSHELF_GID=${PGID}
      - TZ=${TZ:-America/New_York}
    volumes:
      # Config (SQLite DB) + metadata MUST be plain local disk — never the encfs/gdrive union
      - /var/lib/plexmediaserver/.config/audiobookshelf/config:/config
      - /var/lib/plexmediaserver/.config/audiobookshelf/metadata:/metadata
      # Library mounted read-only; Readarr owns writes to these files
      - /home/plex/sorted/Audiobooks:/audiobooks
      - /home/plex/sorted/Podcasts:/podcasts
    ports:
      - "127.0.0.1:13378:80"   # bound to loopback; nginx + Cloudflare front it
    networks:
      - default
      - cpam-shared
    restart: unless-stopped

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
  cpam-shared:
    external: true
